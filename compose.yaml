services:
  moodle:
    build:
      context: .
      args:
        MOODLE_VERSION: MOODLE_501_STABLE
    volumes:
      - ./moodledata:/var/moodledata
      - ./plugins:/docker-plugins
    ports:
      - "127.0.0.1:${MOODLE_HOST_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login/index.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - database_net
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.moodle-cron.schedule: "@every 15m"
      ofelia.job-exec.moodle-cron.command: "php /var/www/html/admin/cli/cron.php"
      ofelia.job-exec.moodle-cron.user: "www-data"
    environment:
      MOODLE_INSTALL_ADMIN_PASS: ${MOODLE_INSTALL_ADMIN_PASS}
      MOODLE_INSTALL_ADMIN_EMAIL: ${MOODLE_INSTALL_ADMIN_EMAIL}
      MOODLE_SITE_NAME: ${MOODLE_SITE_NAME}
      MOODLE_DB_HOST: ${MOODLE_DB_HOST}
      MOODLE_DB_NAME: ${MOODLE_DB_NAME}
      MOODLE_DB_USER: ${MOODLE_DB_USER}
      MOODLE_DB_PASS: ${MOODLE_DB_PASS}
      MOODLE_DB_PORT: ${MOODLE_DB_PORT}
      MOODLE_DB_PREFIX: ${MOODLE_DB_PREFIX:-mdl_}
      MOODLE_SITE_URL: ${MOODLE_SITE_URL}
      MOODLE_SSL_PROXY: ${MOODLE_SSL_PROXY:-false}

  ofelia:
    image: mcuadros/ofelia:latest
    command: daemon --docker
    restart: unless-stopped
    depends_on:
      - moodle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - database_net

networks:
  database_net:
    external: true
